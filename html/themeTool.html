<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Theme Tool</title>
    <link rel="stylesheet" href="../style.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;700;900&display=swap');
        body {
            font-family: 'Space Grotesk', sans-serif;
            background-color: #fff;
            color: #0a0a0a;
            margin: 0;
            padding: 40px 60px;
        }
        main {
            max-width: 900px;
            margin: 0 auto;
        }
        #palette {
            display: flex;
            flex-direction: flex-row;
            gap: 20px;
            margin-top: 30px;
        }
        #preview {
            padding: 40px;
            margin-top: 30px;
        }
        #cssOutput {
            width: 100%;
            height: 220px;
            margin-top: 20px;
            padding: 20px;
            font-family: 'Courier New', Courier, monospace;
            font-size: 14px;
        }
        #headerContent {
            text-align: center;
        }
        #preview * {
            all: unset;
            display: revert;
            box-sizing: border-box;
        }
    </style>
</head>
<body>
    <main>
        <div id="headerContent">
            <h1>THEME TOOL</h1>
            <p>Don't consult AI for your themes. Use this tool! :D</p>
            <br>
        </div>
        <div style="display:flex; align-items:center; justify-content:center; gap:40px; margin-top:30px;">
            <div>
                <label for="baseColor">BASE COLOR:</label><br>
                <input type="color" id="baseColor" value="#7B3FA0">
            </div>
            <div>
                <label for="radiusSlider">Corner Radius</label><br>
                <input type="range" min="0" max="20" value="0" id="radiusSlider">
                <span id="radiusValue">0px</span>
            </div>
            <div>
                <label for="boxShadowSlider">Box Shadow</label><br>
                <input type="range" min="0" max="16" value="0" id="boxShadowSlider">
                <span id="boxShadowValue">0px</span>
            </div>
            <div>
                <label for="styleModifier">Style</label><br>
                <select id="styleModifier">
                    <option value="brutalist">Brutalist</option>
                    <option value="sleek" selected>Sleek</option>
                    <option value="bright">Bright</option>
                    <option value="glass">Glass</option>
                </select>
            </div>
            <div>
                <label for="fontMod">Font:</label><br>
                <select id="fontMod">
                    <option value="Inter">Inter</option>
                    <option value="Space Grotesk">Space Grotesk</option>
                    <option value="Playfair Display">Playfair Display</option>
                    <option value="Outfit">Outfit</option>
                    <option value="DM Serif Display">DM Serif Display</option>
                    <option value="JetBrains Mono">JetBrains Mono</option>
                    <option value="Raleway">Raleway</option>
                    <option value="Nunito">Nunito</option>
                    <option value="Bebas Neue">Bebas Neue</option>
                    <option value="Josefin Sans">Josefin Sans</option>
                    <option value="Merriweather">Merriweather</option>
                    <option value="Fira Code">Fira Code</option>
                    <option value="Cinzel">Cinzel</option>
                    <option value="Syne">Syne</option>
                </select>
            </div>
        </div>
        <div style="display:flex; align-items:center; justify-content:center; gap:40px; margin-top:40px;">
            <div>
                <label>Modes</label><br>
                <button id="modeToggle">DARK</button>
                <button style="margin-left:20px;" id="glowToggle">GLOW OFF</button>
            </div>
        </div>
        <div style="display:flex; justify-content:center;" id="palette">

        </div>
        <div id="preview">

        </div>
        <br>
        <div style="display:flex; align-items:center; gap:20px; margin-top:20px;">
            <label for="cssOutput" style="font-size:23px; text-decoration:underline;">CSS Output:</label>
            <button id="copyBtn">COPY ALL</button>
        </div>
        <textarea id="cssOutput">

        </textarea>
    </main>
    <script>
        const colorPicker = document.getElementById("baseColor");
        const palette = document.getElementById("palette");
        const radiusSlider = document.getElementById("radiusSlider");
        const radiusValue = document.getElementById("radiusValue");
        const boxShadowSlider = document.getElementById("boxShadowSlider");
        const boxShadowValue = document.getElementById("boxShadowValue");
        const preview = document.getElementById("preview");
        const cssOutput = document.getElementById("cssOutput");
        const styleModifier = document.getElementById("styleModifier");
        const modeToggle = document.getElementById("modeToggle");
        const fontMod = document.getElementById("fontMod");
        const copyBtn = document.getElementById("copyBtn");

        let currentBorder = "#0a0a0a";
        let darkMode = true;
        let glowMode = false;

        colorPicker.addEventListener("input", (e) => {
            updatePalette(e.target.value);
        });

        modeToggle.addEventListener("click", () => {
            darkMode = !darkMode;
            modeToggle.innerText = darkMode ? "DARK" : "LIGHT";
            updatePalette(colorPicker.value);
        });

        glowToggle.addEventListener("click", () => {
            glowMode = !glowMode;
            glowToggle.innerText = glowMode ? "GLOW ON" : "GLOW OFF";
            updatePalette(colorPicker.value);
        });

        styleModifier.addEventListener("change", (e) => {
            updatePalette(colorPicker.value);
        });

        fontMod.addEventListener("change", () => {
            loadFont(fontMod.value);
            updatePalette(colorPicker.value);
        });

        radiusSlider.addEventListener("input", () => {
            radiusValue.innerText = radiusSlider.value + "px";
            preview.style.borderRadius = radiusSlider.value + "px";
            updatePalette(colorPicker.value);
        });

        boxShadowSlider.addEventListener("input", () => {
            boxShadowValue.innerText = boxShadowSlider.value + "px";
            preview.style.boxShadow = `${boxShadowSlider.value}px ${boxShadowSlider.value}px 0px ${currentBorder}`;
            updatePalette(colorPicker.value);
        });

        copyBtn.addEventListener("click", () => {
            navigator.clipboard.writeText(cssOutput.value);
            copyBtn.innerText = "COPIED!";
            setTimeout(() => copyBtn.innerText = "COPY", 2000);
        });


        //init
        updatePalette(colorPicker.value);
        loadFont(fontMod.value);

        function loadFont(font) {
            const link = document.createElement("link");
            link.rel = "stylesheet";
            link.href = `https://fonts.googleapis.com/css2?family=${font.replace(/ /g, "+")}&display=swap`;
            document.head.appendChild(link);
        }

        function updatePalette(hex) {
            const hsl = hexToHSL(hex);

            const styles = {
                brutalist: { surfaceS: hsl.s, surfaceL: 97, borderS: 20, borderL: 15, textS: 20, textL: 10, dimS: 10, dimL: 45, bgL: 95 },
                sleek:     { surfaceS: 5,     surfaceL: 98, borderS: 5,  borderL: 60, textS: 10, textL: 15, dimS: 5,  dimL: 55, bgL: 96 },
                bright:    { surfaceS: hsl.s, surfaceL: 95, borderS: 40, borderL: 20, textS: 30, textL: 8,  dimS: 20, dimL: 40, bgL: 90 },
                glass:     { surfaceS: 10,    surfaceL: 96, borderS: 10, borderL: 70, textS: 15, textL: 12, dimS: 5,  dimL: 50, bgL: 94 }
            };

            const st = styles[styleModifier.value];

            const bgL    = darkMode ? 8  : st.bgL;
            const surfL  = darkMode ? 12 : st.surfaceL;
            const surfS  = darkMode ? st.surfaceS : st.surfaceS;
            const textL  = darkMode ? 90 : st.textL;
            const dimL   = darkMode ? 55 : st.dimL;
            const borderL = darkMode ? 25 : st.borderL;

            const surface  = `hsl(${hsl.h}, ${surfS}%, ${surfL}%)`;
            const bg       = `hsl(${hsl.h}, ${surfS}%, ${bgL}%)`;
            const textMain = `hsl(${hsl.h}, ${st.textS}%, ${textL}%)`;
            const textDim  = `hsl(${hsl.h}, ${st.dimS}%, ${dimL}%)`;
            const border   = `hsl(${hsl.h}, ${st.borderS}%, ${borderL}%)`;
            const surface2 = darkMode
                ? `hsl(${hsl.h}, ${surfS}%, 18%)`
                : `hsl(${hsl.h}, ${surfS}%, 93%)`;

            const void_ = darkMode
                ? `hsl(${hsl.h}, 20%, 4%)`
                : `hsl(${hsl.h}, 20%, 98%)`;
            const accent = hex;
            const btnGlow = glowMode ? `0 0 16px ${accent}88, 0 4px 12px ${accent}44` : `none`;

            currentBorder = border;

            const colors = [
                { name: "--accent", value: accent },
                { name: "--surface", value: surface },
                { name: "--text-main", value: textMain },
                { name: "--text-dim", value: textDim },
                { name: "--bg", value: bg },
                { name: "--border", value: border },
                { name: "--surface2", value: surface2 },
                { name: "--void", value: void_ },
            ];

            palette.innerHTML = "";

            colors.forEach(c => {
                const swatch = document.createElement("div");
                swatch.innerHTML = `
                    <div style="width:60px;height:60px;background:${c.value};border:2px solid #0a0a0a;"></div>
                    <p style="font-size:11px;margin-top:6px;">${c.name}</p>
                `;
                palette.appendChild(swatch);
            });

            preview.style.background = surface;
            preview.style.border = `4px solid ${border}`;
            preview.style.borderRadius = radiusSlider.value + "px";
            preview.style.boxShadow = glowMode
                ? `0 0 24px ${accent}66, 0 0 8px ${accent}33`
                : `${boxShadowSlider.value}px ${boxShadowSlider.value}px 0px ${border}`;
            preview.style.color = textMain;
            preview.style.fontFamily = `'${fontMod.value}', sans-serif`;
            preview.style.fontSize = "16px";
            preview.style.lineHeight = "1.6";
            preview.style.padding = "40px";
            preview.style.boxSizing = "border-box";


            preview.innerHTML = `
                <div style="height:6px;background:${accent};margin:-40px -40px 24px -40px;border-radius:${radiusSlider.value}px ${radiusSlider.value}px 0 0;"></div>
                <h3 style="color:${textMain};margin-bottom:8px;">Card Title</h3>
                <p style="color:${textDim};font-size:14px;line-height:1.7;margin-bottom:20px;">This is a preview of your theme. Body text sits here, showing contrast and readability at a glance.</p>
                <div style="display:flex;gap:10px;">
                    <button style="background:${accent};color:${surface};border:2px solid ${accent};padding:10px 20px;box-shadow:${btnGlow};">Primary</button>
                    <button style="background:transparent;color:${accent};border:2px solid ${accent};padding:10px 20px;">Secondary</button>
                </div>
            `;

            cssOutput.value = `
@import url('https://fonts.googleapis.com/css2?family=${fontMod.value.replace(/ /g, "+")}&display=swap');

:root {
    --accent: ${accent};
    --surface: ${surface};
    --text-main: ${textMain};
    --text-dim: ${textDim};
    --bg: ${bg};
    --border: ${border};
    --topbar-h: 56px;
    --surface2: ${surface2};
    --void: ${void_};
    --glow: ${glowMode ? `0 0 24px ${accent}66` : "none"};
    --font-family: '${fontMod.value}', sans-serif;
}
            `;
        }

        function hexToHSL(hex) {
            let r = parseInt(hex.slice(1,3), 16) / 255;
            let g = parseInt(hex.slice(3,5), 16) / 255;
            let b = parseInt(hex.slice(5,7), 16) / 255;

            const max = Math.max(r,g,b), min = Math.min(r,g,b);
            let h, s, l = (max + min) / 2;

            if (max === min) {
                h = s = 0;
            } else {
                const d = max - min;
                s = l > 0.5 ? d / (2 - max - min) : d / (max + min);
                switch(max) {
                    case r: h = ((g - b) / d + (g < b ? 6 : 0)) / 6; break;
                    case g: h = ((b - r) / d + 2) / 6; break;
                    case b: h = ((r - g) / d + 4) / 6; break;
                }
            }

            return { h: Math.round(h * 360), s: Math.round(s * 100), l: Math.round(l * 100) };


        }
    </script>
</body>
</html>
