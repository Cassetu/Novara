<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Theme Tool</title>
    <link rel="stylesheet" href="../style.css">
    <link rel="stylesheet" href="../css/course.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;700;900&display=swap');
        body {
            font-family: 'Space Grotesk', sans-serif;
            background-color: #fff;
            color: #0a0a0a;
            margin: 0;
            padding: 40px 60px;
        }
        main {
            max-width: 900px;
            margin: 0 auto;
        }
    </style>
</head>
<body>
    <main>
        <div id="headerContent">
            <h1>THEME TOOL</h1>
            <p>Don't consult AI for your themes. Use this tool! :D</p>
        </div>
        <div id="colorPicker">
            <label for="baseColor">BASE COLOR</label>
            <input type="color" id="baseColor" name="baseColor" value="#77BBA2">
        </div>
        <div id="palette">

        </div>
    </main>
    <script>
        const colorPicker = document.getElementById("baseColor");
        const palette = document.getElementById("palette");

        colorPicker.addEventListener("input", (e) => {
            console.log(hexToHSL(e.target.value));

            const hsl = hexToHSL(e.target.value);

            const complement = (hsl.h + 180) % 360;
            const surface = `hsl(${hsl.h}, ${hsl.s}%, 97%)`;
            const textMain = `hsl(${hsl.h}, 20%, 10%)`;
            const textDim = `hsl(${hsl.h}, 10%, 45%)`;
            const bg = `hsl(${hsl.h}, ${hsl.s}%, 95%)`;
            const accent = e.target.value;
            const border = `hsl(${hsl.h}, 20%, 15%)`;

            palette.innerHTML = "";
        });


        function hexToHSL(hex) {
            let r = parseInt(hex.slice(1,3), 16) / 255;
            let g = parseInt(hex.slice(3,5), 16) / 255;
            let b = parseInt(hex.slice(5,7), 16) / 255;

            const max = Math.max(r,g,b), min = Math.min(r,g,b);
            let h, s, l = (max + min) / 2;

            if (max === min) {
                h = s = 0;
            } else {
                const d = max - min;
                s = l > 0.5 ? d / (2 - max - min) : d / (max + min);
                switch(max) {
                    case r: h = ((g - b) / d + (g < b ? 6 : 0)) / 6; break;
                    case g: h = ((b - r) / d + 2) / 6; break;
                    case b: h = ((r - g) / d + 4) / 6; break;
                }
            }

            return { h: Math.round(h * 360), s: Math.round(s * 100), l: Math.round(l * 100) };


        }
    </script>
</body>
</html>
