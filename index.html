<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Novara</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="css/course.css">

    <script type="module" src="firebase-config.js"></script>
    <script type="module" src="app.js" defer></script>
</head>
<body>

<div id="auth-view" class="auth">
    <div class="auth-box">
        <h1>Sign In</h1>
        <form id="auth-form">
            <input type="email" id="email" placeholder="Email" required>
            <button type="submit">Verify</button>
        </form>
        <p id="message"></p>
    </div>
</div>

<div id="app-view" class="app" style="display: none;">
    <aside class="sidebar">
        <h2>Menu</h2>
        <nav>
            <ul>
                <li><a href="#" id="load-js101">Javascript 101</a></li>
            </ul>
        </nav>

        <div class="notepad-container">
            <h3>Scratchpad</h3>
            <textarea id="notepad" placeholder="Write your notes here..."></textarea>
        </div>
    </aside>

    <main class="Workspace">
        <div id="course-header"></div>
        <div id="module-content"></div>

        <div class="Controls">
            <button id="next-btn" style="display: none;">Next</button>
        </div>
    </main>
</div>

<script type="module" src="js/course.js" defer></script>

</body>
</html>
