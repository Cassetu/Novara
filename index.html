<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Novara</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="css/course.css">

    <script type="module" src="firebase-config.js"></script>
    <script type="module" src="app.js" defer></script>
</head>
<body>

<div id="auth-view" class="auth">
    <div class="auth-box">
        <h1>Sign In</h1>
        <form id="auth-form">
            <input type="email" id="email" placeholder="Email" required>
            <button type="submit">Verify</button>
        </form>
        <p id="message"></p>
    </div>
</div>

<div id="app-view" class="app" style="display: none;">

    <aside class="sidebar" id="main-sidebar">
        <h2>active</h2>
        <nav>
            <ul id="enrolled-list">
            </ul>
        </nav>

        <h2 style="margin-top: 40px;">system</h2>
        <nav>
            <ul>
                <li><a href="#" id="nav-explorer">curriculums</a></li>
                <li><a href="#" id="nav-settings">settings</a></li>
            </ul>
        </nav>
    </aside>

    <main class="workspace" id="main-workspace">

        <div id="view-explorer" class="view-layer">
            <div class="explorer-header">
                <div class="category-filters">
                    <button class="filter-btn active" data-filter="all">all</button>
                    <button class="filter-btn" data-filter="engineering">engineering</button>
                    <button class="filter-btn" data-filter="data">data</button>
                    <button class="filter-btn" data-filter="design">design</button>
                </div>
                <input type="text" id="search-bar" placeholder="search matrix...">
            </div>
            <div id="catalog-grid" class="catalog-grid"></div>
        </div>

        <div id="view-syllabus" class="view-layer" style="display: none;">
            <h1 id="syllabus-title"></h1>
            <div id="syllabus-content"></div>
        </div>

        <div id="view-lesson" class="view-layer" style="display: none;">
        </div>

    </main>
</div>

<script type="module" src="js/course.js" defer></script>

</body>
</html>
